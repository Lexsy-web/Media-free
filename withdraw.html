<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal Request</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        button:disabled {
            background: #999;
            cursor: not-allowed;
        }
        .success {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            text-align: center;
        }
        .success.show {
            display: block;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Withdrawal Request</h1>
        <form id="withdrawForm">
            <div class="form-group">
                <label for="amount">Withdrawal Amount (₦)</label>
                <input type="number" id="amount" name="amount" placeholder="Enter amount" required min="0.01" step="0.01">
            </div>
            
            <div class="form-group">
                <label for="bank">Bank Name</label>
                <select id="bank" name="bank" required>
                    <option value="">Select bank</option>
                    <option value="gtbank">Guaranty Trust Bank (GTBank)</option>
                    <option value="firstbank">First Bank</option>
                    <option value="access">Access Bank</option>
                    <option value="zenith">Zenith Bank</option>
                    <option value="uba">United Bank for Africa (UBA)</option>
                    <option value="standard">Stanbic IBTC</option>
                    <option value="fcmb">First City Monument Bank (FCMB)</option>
                    <option value="ecobank">Ecobank</option>
                    <option value="opay">OPay</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="accountNumber">Account Number</label>
                <input type="text" id="accountNumber" name="accountNumber" placeholder="Enter account number" required>
            </div>
            
            <div class="form-group">
                <label for="accountHolder">Account Holder Name</label>
                <input type="text" id="accountHolder" name="accountHolder" placeholder="Enter full name" required>
            </div>
            
            <button type="submit">Submit Withdrawal Request</button>
        </form>
        
        <div class="loading" id="loading">
            <p>Processing your request...</p>
        </div>
        
        <div class="success" id="successMessage">
            <p>✓ Withdrawal request submitted successfully!</p>
            <p>Your funds will be transferred within the next business days.</p>
        </div>
    </div>

    <script>
        document.getElementById('withdrawForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('withdrawForm').style.display = 'none';
            document.getElementById('loading').classList.add('show');
            
            setTimeout(function() {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('successMessage').classList.add('show');
            }, 3000);
        });
    </script>
</body>
</html>
